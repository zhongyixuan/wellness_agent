<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessAgent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-50 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-green-600 text-white px-6 py-4 shadow">
        <h1 class="text-xl font-bold">🌿 WellnessAgent</h1>
    </header>
    <!-- Main -->
    <main class="flex flex-1 gap-4 p-4 overflow-hidden">

        <!-- Left: Chat -->
        <div class="flex flex-col w-1/2 bg-white rounded-xl shadow p-4">
            <h2 class="text-lg font-semibold text-gray-700 mb-3">💬 對話</h2>
            <div id="messages" class="flex-1 overflow-y-auto space-y-3 mb-4"></div>
            <div class="flex gap-2">
                <input id="input" type="text" placeholder="輸入訊息..."
                    class="flex-1 border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
                <button onclick="sendMessage()"
                    class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">
                    送出
                </button>
            </div>
        </div>

        <!-- Right -->
        <div class="flex flex-col w-1/2 gap-4">
            <!-- Weight Trend -->
            <div class="bg-white rounded-xl shadow p-4 flex-1">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-gray-700">📈 體重趨勢</h2>
                    <button onclick="loadWeightTrend()" class="text-sm text-green-600 hover:underline">重新整理</button>
                </div>
                <canvas id="weightChart"></canvas>
            </div>

            <!-- Weekly Report -->
            <div class="bg-white rounded-xl shadow p-4 flex-1">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold text-gray-700">📊 週報告</h2>
                    <button onclick="loadWeeklyReport()" class="text-sm text-green-600 hover:underline">重新整理</button>
                </div>
                <div id="weekly-report" class="text-sm text-gray-600 space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const API = "http://127.0.0.1:8000";
        const USER_ID = "user_001";
        let weightChart = null;

        // --- Chat ---
        async function sendMessage() {
            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            appendMessage("user", message);
            input.value = "";
            appendMessage("agent", "思考中...");

            const res = await fetch(`${API}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: USER_ID, message })
            });

            const data = await res.json();
            removeLastMessage();
            appendMessage("agent", data.reply);

            loadWeightTrend();
            loadWeeklyReport();
        }

        function appendMessage(role, text) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = role === "user" ? "text-right" : "text-left";
            div.innerHTML = `
    <span class="inline-block px-4 py-2 rounded-xl text-sm max-w-xs ${role === "user" ? "bg-green-100 text-green-900" : "bg-gray-100 text-gray-800"
                }">
      ${text.replace(/\n/g, "<br>")}
    </span>
  `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeLastMessage() {
            const messages = document.getElementById("messages");
            messages.removeChild(messages.lastChild);
        }

        // --- Weight Trend ---
        async function loadWeightTrend() {
            const res = await fetch(`${API}/weight-trend`);
            if (!res.ok) return;
            const trend = await res.json();

            const labels = trend.map(d => d.date);
            const weights = trend.map(d => d.weight);

            if (weightChart) weightChart.destroy();
            weightChart = new Chart(document.getElementById("weightChart"), {
                type: "line",
                data: {
                    labels,
                    datasets: [{
                        label: "體重 (kg)",
                        data: weights,
                        borderColor: "#16a34a",
                        backgroundColor: "rgba(22,163,74,0.1)",
                        tension: 0.3,
                        fill: true,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        // --- Weekly Report ---
        async function loadWeeklyReport() {
            const res = await fetch(`${API}/weekly-report`);
            if (!res.ok) return;
            const report = await res.json();

            document.getElementById("weekly-report").innerHTML = `
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-green-50 rounded-lg p-3 text-center">
            <div class="text-xs text-gray-500">體重變化</div>
            <div class="text-xl font-bold text-green-700">
              ${report.weight.change !== null ? report.weight.change + " kg" : "—"}
            </div>
          </div>
          <div class="bg-blue-50 rounded-lg p-3 text-center">
            <div class="text-xs text-gray-500">平均每日熱量</div>
            <div class="text-xl font-bold text-blue-700">${report.food.avg_daily_calories} kcal</div>
          </div>
          <div class="bg-orange-50 rounded-lg p-3 text-center">
            <div class="text-xs text-gray-500">本週運動</div>
            <div class="text-xl font-bold text-orange-700">${report.exercise.total_minutes} 分鐘</div>
          </div>
        </div>
        <div class="text-xs text-gray-400 mt-2">${report.period}</div>
      `;
        }

        // Init
        loadWeightTrend();
        loadWeeklyReport();
    </script>
</body>

</html>
